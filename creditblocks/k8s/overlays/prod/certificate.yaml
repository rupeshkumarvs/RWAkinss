apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: creditblocks-tls
  namespace: creditblocks-prod
spec:
  secretName: creditblocks-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - api.creditblocks.io
  - creditblocks.io
  - www.creditblocks.io
  # Certificate will be automatically renewed by cert-manager
  # Default renewal is 30 days before expiration

