services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trustmesh
      POSTGRES_PASSWORD: trustmesh
      POSTGRES_DB: trustmesh
    ports:
      - "5432:5432"
    volumes:
      - trustmesh-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustmesh -d trustmesh"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - trustmesh-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trustmesh-postgres:
  trustmesh-redis:
